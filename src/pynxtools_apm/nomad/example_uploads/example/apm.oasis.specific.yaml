custom_coordinate_system:
- alias: This is an example! Following the idea of McStas that the z-axis points along the direction of an ion leaving the apex along the longest direction of the specimen.
  type: cartesian
  handedness: right_handed
  xaxis_direction: Direction 1 that is perpendicular to the z_direction for a right_handed cartesian
  xaxis_alias: x-axis
  yaxis_direction: Direction 2 that is perpendicular to the xaxis_direction and the z_direction for a right_handed cartesian
  yaxis_alias: y-axis
  zaxis_direction: Direction of an ion travelling hypothetically exactly along the assumed axis that is parallel to the longest direction of the specimen.
  zaxis_alias: z-axis
  origin: E.g. a characteristic point e.g. initial apex or center of the base of the specimen or something else.

