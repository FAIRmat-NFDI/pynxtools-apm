name: linting

on: [push]

env:
  python-version: 3.12

jobs:
  linting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Install uv and Python ${{ env.python-version }}
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: ${{ env.python-version }}
      - name: Install dependencies
        run: |
          uv sync --dev
      - name: ruff check
        run: |
          uv run ruff check src/pynxtools_apm tests
      - name: ruff format
        run: |
          uv run ruff format --check src/pynxtools_apm tests
      - name: mypy
        run: |
          uv run mypy src/pynxtools_apm tests
